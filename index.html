<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Hanbill Blog</title>
    <style>
        :root { --primary-color: #004695; --text-color: #333; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; line-height: 1.6; color: var(--text-color); margin: 0; padding: 0; background: #fafafa; }
        header { background: white; border-bottom: 1px solid #eee; padding: 2rem 1rem; text-align: center; }
        header h1 { margin: 0; color: var(--primary-color); font-size: 2.5rem; }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        article { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 2rem; }
        article h2 { margin-top: 0; color: var(--primary-color); }
        .meta { color: #999; font-size: 0.9rem; margin-bottom: 1rem; }
        footer { text-align: center; padding: 2rem; color: #999; font-size: 0.8rem; }
        .btn { display: inline-block; padding: 0.5rem 1rem; background: var(--primary-color); color: white; text-decoration: none; border-radius: 4px; margin-top: 1rem; }
    </style>
</head>
<body>
    <header>
        <h1>Hanbill Tech Blog</h1>
        <p>세상을 바꾸는 전자고지결제 이야기</p>
    </header>
    <div class="container">
        <article>
            <div class="meta">2026년 4월 6일</div>
            <h2>블로그를 시작합니다!</h2>
            <p>GitHub Pages를 이용한 한빌 테크 블로그의 첫 번째 포스팅입니다. 앞으로 이곳에서 다양한 기술 정보와 소식을 전해드리겠습니다.</p>
            <a href="#" class="btn">더 읽기</a>
        </article>
        <article>
            <div class="meta">2026년 4월 5일</div>
            <h2>전자고지결제(EBPP)란 무엇인가?</h2>
            <p>종이 고지서 없는 세상을 만드는 EBPP 서비스의 핵심 가치와 미래 전망에 대해 알아봅니다.</p>
            <a href="#" class="btn">더 읽기</a>
        </article>
    </div>
    <footer>
        &copy; 2026 Hanbill Blog. Powered by GitHub Pages.
    </footer>
</body>
</html>
